<VirtualHost *:80>
    ServerName jobbrige-backend.local
    DocumentRoot "C:/xampp/htdocs/jobbrige/backend/public"
    
    <Directory "C:/xampp/htdocs/jobbrige/backend/public">
        AllowOverride All
        Require all granted
        
        # CORS Headers
        Header always set Access-Control-Allow-Origin "http://localhost:3000"
        Header always set Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-CSRF-TOKEN"
        Header always set Access-Control-Allow-Credentials "true"
        Header always set Access-Control-Max-Age "86400"
        
        # Handle OPTIONS preflight requests
        RewriteEngine On
        RewriteCond %{REQUEST_METHOD} OPTIONS
        RewriteRule ^(.*)$ $1 [R=200,L]
    </Directory>
    
    # Redirigir todas las peticiones a index.php
    RewriteEngine On
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ index.php [QSA,L]
    
    ErrorLog "logs/jobbrige-error.log"
    CustomLog "logs/jobbrige-access.log" common
</VirtualHost> 